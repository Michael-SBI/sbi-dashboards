<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBI Project Dashboards</title>
<style>
body{font-family:'Inter',system-ui,sans-serif;background:#0f2540;color:#fff;margin:0;padding:40px;min-height:100vh}
h1{font-size:24px;margin-bottom:8px}
.sub{color:#7fa8cc;font-size:14px;margin-bottom:32px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
a.card{background:#1a3a5c;border-radius:10px;padding:20px;text-decoration:none;color:#fff;transition:background .15s;border:1px solid #2a4a6c}
a.card:hover{background:#1e4470}
.card h2{font-size:16px;margin:0 0 6px}
.card .type{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#7fa8cc}
</style>
</head>
<body>
<h1>SBI Project Dashboards</h1>
<div class="sub">Spoke Building & Interiors</div>
<div class="grid">
<a class="card" href="sunshine-kebabs/"><h2>Sunshine Kebabs</h2><div class="type">251206 - BUILD</div></a>
<a class="card" href="endo-water-damage/"><h2>Endo Water Damage</h2><div class="type">260129 - BUILD</div></a>
<a class="card" href="lakehaven-post-office/"><h2>Lakehaven Post Office</h2><div class="type">260304 - DESIGN</div></a>
<a class="card" href="natural-foot-podiatry-erina-fair/"><h2>Natural Foot Podiatry Erina Fair</h2><div class="type">260306 - BUILD</div></a>
<a class="card" href="marine-rescue/"><h2>Marine Rescue</h2><div class="type">260316 - BUILD</div></a>
</div>
</body>
</html>
