<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f0f2f5;color:#1a2332;font-size:13px;line-height:1.5}

/* HEADER */
.header{background:#0f2540;color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header-left h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.header-left .sub{font-size:12px;color:#7fa8cc;margin-top:3px}
.header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.health-badge{font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;color:#fff;letter-spacing:.3px}
.updated{font-size:11px;color:#7fa8cc}
.print-btn{background:#1d4ed8;color:#fff;border:none;padding:7px 14px;border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.print-btn:hover{background:#1e40af}

/* PHASE TRACKER */
.phase-wrap{background:#0f2540;padding:0 28px 16px}
.phase-track{display:flex;gap:3px;position:relative}
.phase-step{flex:1;text-align:center;padding:7px 4px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;position:relative}
.phase-step.done{background:#C0DD97;color:#27500A}
.phase-step.active{background:#B5D4F4;color:#0C447C}
.phase-step.pending{background:#1a3a5c;color:#4a7a9c}
.phase-step.done::after,.phase-step.active::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-left-color:inherit;z-index:1}
.phase-step.done::after{border-left-color:#C0DD97}
.phase-step.active::after{border-left-color:#B5D4F4}

/* METRIC CARDS */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:20px 28px 0}
.metric{background:#fff;border-radius:8px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-top:3px solid #e2e8f0}
.metric.red{border-top-color:#dc2626}
.metric.amber{border-top-color:#d97706}
.metric.blue{border-top-color:#1d4ed8}
.metric.green{border-top-color:#16a34a}
.metric.purple{border-top-color:#7c3aed}
.metric.orange{border-top-color:#ea580c}
.metric .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#64748b;margin-bottom:5px}
.metric .value{font-size:22px;font-weight:700;line-height:1}
.metric .sub{font-size:11px;color:#94a3b8;margin-top:3px}

/* TABS */
.tab-bar{background:#fff;border-bottom:2px solid #e2e8f0;padding:0 28px;display:flex;gap:2px;margin-top:20px;overflow-x:auto}
.tab-btn{background:none;border:none;padding:11px 16px;font-family:inherit;font-size:12px;font-weight:500;color:#64748b;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:#1a2332}
.tab-btn.active{color:#0f2540;border-bottom-color:#1d4ed8;font-weight:600}

/* CONTENT */
.content{padding:20px 28px}
.panel{display:none}
.panel.active{display:block}

/* SECTION TITLES */
.sec{font-size:13px;font-weight:700;color:#0f2540;margin:20px 0 10px;padding-bottom:7px;border-bottom:2px solid #e2e8f0}
.sec:first-child{margin-top:0}

/* TABLES */
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;font-size:12px;margin-bottom:20px}
thead th{background:#0f2540;color:#fff;text-align:left;padding:9px 13px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
tbody tr{border-bottom:1px solid #f1f5f9}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8fafc}
tbody td{padding:9px 13px;vertical-align:top}
td.right,th.right{text-align:right;font-variant-numeric:tabular-nums}

/* BADGES */
.b{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.b-red{background:#fef2f2;color:#dc2626}
.b-orange{background:#fff7ed;color:#ea580c}
.b-amber{background:#fffbeb;color:#d97706}
.b-green{background:#f0fdf4;color:#16a34a}
.b-blue{background:#eff6ff;color:#1d4ed8}
.b-purple{background:#f5f3ff;color:#7c3aed}
.b-grey{background:#f1f5f9;color:#64748b}

/* COMPLIANCE GRID */
.cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:20px}
.cert-card{background:#fff;border-radius:8px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;align-items:flex-start;gap:10px;border-left:3px solid #e2e8f0}
.cert-card.done{border-left-color:#16a34a}
.cert-card.wip{border-left-color:#d97706}
.cert-card.todo{border-left-color:#dc2626}
.cert-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.cert-name{font-size:12px;font-weight:600;color:#1a2332}
.cert-owner{font-size:11px;color:#64748b;margin-top:2px}

/* NEXT ACTIONS */
.action-list{list-style:none;margin-bottom:20px}
.action-item{background:#fff;border-radius:8px;padding:11px 14px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:8px;border-left:3px solid #e2e8f0;display:flex;align-items:flex-start;gap:10px}
.action-item.urgent{border-left-color:#dc2626}
.action-item.high{border-left-color:#d97706}
.action-item.normal{border-left-color:#1d4ed8}
.action-num{font-size:11px;font-weight:700;color:#94a3b8;min-width:20px;margin-top:1px}
.action-body{flex:1}
.action-title{font-size:12px;font-weight:600;margin-bottom:2px}
.action-meta{font-size:11px;color:#64748b;display:flex;gap:10px;flex-wrap:wrap}

/* PROJECT SUMMARY CARDS */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.summary-card{background:#fff;border-radius:8px;padding:12px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #e2e8f0;display:flex;align-items:flex-start;gap:12px}
.summary-card .sc-body{flex:1}
.summary-card .sc-title{font-size:12px;font-weight:700;color:#0f2540;margin-bottom:3px}
.summary-card .sc-detail{font-size:11px;color:#64748b;line-height:1.5}
.summary-card .sc-owner{display:inline-block;font-size:9px;font-weight:700;color:#fff;background:#0f2540;border-radius:3px;padding:1px 6px;letter-spacing:.3px;margin-left:8px}

/* MEETING NOTES */
/* (meeting notes removed) */
.editable{background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:9px 11px;min-height:38px;outline:none;font-family:inherit;font-size:12px;color:#1a2332;width:100%}
.editable:focus{border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.1)}
.editable:empty::before{content:attr(data-ph);color:#94a3b8}
textarea.editable{resize:vertical;min-height:90px}
/* (checklist styles removed) */
.btn-print{background:#0f2540;color:#fff;border:none;padding:9px 20px;border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-top:4px}
.btn-print:hover{background:#1a3a5c}

/* FOOTER */
.footer{background:#0f2540;color:#4a7a9c;font-size:11px;padding:11px 28px;display:flex;justify-content:space-between;margin-top:28px}

/* PRINT */
@media print{
  .tab-bar,.btn-print,.print-btn,.save-btn{display:none!important}

}

/* RESPONSIVE */
@media(max-width:900px){
  .metrics{grid-template-columns:repeat(3,1fr)}
  /* (meeting notes responsive removed) */
  .summary-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .metrics{grid-template-columns:repeat(2,1fr)}
}
</style>

    return new Date(ts).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
  }
  function workflowBadgeColor(wf){
    if(!wf) return 'grey';
    var w = wf.toLowerCase();
    if(w.indexOf('paid')>=0) return 'green';
    if(w.indexOf('sent')>=0 && w.indexOf('not')<0) return 'amber';
    if(w.indexOf('ordered')>=0) return 'green';
    if(w.indexOf('received')>=0) return 'green';
    if(w.indexOf('not started')>=0) return 'red';
    if(w.indexOf('not sent')>=0) return 'grey';
    return 'grey';
  }
  function statusBadgeColor(st){
    if(!st) return 'grey';
    var s = st.toLowerCase();
    if(s==='done' || s==='closed' || s==='complete') return 'green';
    if(s.indexOf('progress')>=0 || s==='wip' || s==='work-in-progress') return 'blue';
    if(s==='to do') return 'grey';
    return 'grey';
  }
  function healthBg(status){
    var map = {green:'#16a34a',amber:'#d97706',red:'#dc2626',grey:'#64748b',blue:'#1d4ed8'};
    return map[status] || '#64748b';
  }

    html += '<div style="background:#fff;border-radius:8px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-top:3px solid '+(budgetRemaining >= 0 ? '#16a34a' : '#dc2626')+'">'+
      '<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#64748b;margin-bottom:5px">Budget Remaining</div>'+
      '<div style="font-size:22px;font-weight:700;color:'+(budgetRemaining >= 0 ? '#16a34a' : '#dc2626')+'">'+(budgetRemaining < 0 ? '-' : '')+fmt(Math.abs(budgetRemaining))+'</div>'+
      '<div style="font-size:11px;color:#94a3b8;margin-top:3px">Before costs to complete</div>'+
    '</div>';
    html += '</div>';

    // Budget vs Actual table with bar chart
    var allCodes = (B.labour || []).concat(B.nonLabour || []);
    if(allCodes.length > 0){
      html += '<div style="background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.1);overflow:hidden;margin-bottom:16px">'+
        '<div style="background:#0f2540;color:#fff;padding:10px 18px;display:flex;align-items:center;justify-content:space-between">'+
          '<div style="font-size:12px;font-weight:700">Budget vs Actual by Cost Code (ex GST)</div>'+
          '<div style="display:flex;gap:14px;font-size:10px;font-weight:600">'+
            '<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#1d4ed8;display:inline-block"></span>Budget</span>'+
            '<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#f59e0b;display:inline-block"></span>Actual (OK)</span>'+

        '</div>'+
      '</div>'+
      '<div style="padding:0">'+
        '<div style="display:grid;grid-template-columns:100px 1fr 120px 50px;padding:8px 18px;gap:10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;background:#f8fafc;border-bottom:1px solid #e2e8f0">'+
          '<div>Date</div><div>Description</div><div style="text-align:right">Amount (ex-GST)</div><div></div>'+
        '</div>'+
        '<div id="etc-history"></div>'+
        '<div id="etc-new" style="border-top:2px solid #e2e8f0">'+
          '<div style="padding:6px 18px 2px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#d97706">New Entry</div>'+

            '<input type="date" id="etc-new-date" style="border:1px solid #e2e8f0;border-radius:5px;padding:6px 8px;font-family:inherit;font-size:11px;color:#1a2332;outline:none">'+

        '</div>'+
      '</div>'+
    '</div>';

    document.getElementById('tab-financials').innerHTML = html;

    // Render budget rows with bar charts
    if(allCodes.length > 0){
      // Find the max value across all rows — bars scale relative to this, and the largest fills 100% width
      var maxVal = 0;
      allCodes.forEach(function(r){ maxVal = Math.max(maxVal, r.budget||0, r.actual||0); });

      function barHTML(r, isTotal){
        // Total row uses its own scale (always fills the chart area); individual rows scale to the max individual value
        var scale = isTotal ? Math.max(r.budget||0, r.actual||0) : maxVal;
        if(scale === 0) scale = 1;
        var budgetPct = r.budget > 0 ? (r.budget / scale * 100) : 0;
        var actualPct = r.actual > 0 ? (r.actual / scale * 100) : 0;
        var isOver = r.budget > 0 && r.actual > r.budget;
        var noBudget = r.budget === 0 && r.actual > 0;
        var bal = (r.budget||0) - (r.actual||0);

        var rowBg = isTotal ? 'background:#0f2540;color:#fff;' : '';
        var nameStyle = isTotal ? 'font-weight:700;font-size:12px;color:#fff' : 'font-weight:500;font-size:11px;color:#374151';
        var codeHTML = isTotal ? '' : '<span style="font-family:monospace;font-weight:700;font-size:10px;color:#0f2540;margin-right:6px">'+esc(r.code)+'</span>';

        var budgetCol = r.budget > 0 ? fmt(r.budget) : '<span style="color:#94a3b8">&mdash;</span>';
        var actualCol = r.actual > 0 ? fmt(r.actual) : '<span style="color:#94a3b8">&mdash;</span>';
        var balCol;
        if(r.budget > 0 || r.actual > 0){
          var balStyle = bal > 0 ? 'color:#16a34a;font-weight:700' : bal < 0 ? 'color:#dc2626;font-weight:700' : 'color:#94a3b8';
          balCol = bal !== 0 ? '<span style="'+balStyle+'">'+(bal>0?'+':'')+fmt(bal)+'</span>' : '<span style="color:#94a3b8">&mdash;</span>';
        } else {
          balCol = '<span style="color:#94a3b8">&mdash;</span>';
        }

        if(isTotal){

      '<div style="background:#0f2540;color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'+

        '<div style="background:#0f2540;color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'+
          '<div>'+
            '<div style="font-size:13px;font-weight:700">Site Works Tasks — Gantt View</div>'+
            '<div style="font-size:11px;color:#7fa8cc;margin-top:2px">Individual site tasks from List 10 (proposal scope)</div>'+
          '</div>'+
          '<div style="display:flex;gap:14px;font-size:10px;font-weight:600;flex-wrap:wrap">'+
            '<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#16a34a;display:inline-block"></span>Done</span>'+
            '<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#f8ae00;display:inline-block"></span>In Progress</span>'+
            '<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#dc2626;display:inline-block"></span>Not Started</span>'+
            '<span style="display:flex;align-items:center;gap:5px"><span style="width:2px;height:14px;background:#dc2626;display:inline-block"></span>Today</span>'+
          '</div>'+
        '</div>'+
        '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><canvas id="ganttChart2" style="display:block"></canvas></div>'+
      '</div>';
    }

    // Schedule Detail table (high-level milestones)
    html += '<div class="sec">Schedule Detail</div>';
    html += '<table><thead><tr><th>Task</th><th style="width:120px">Start</th><th style="width:120px">End</th><th style="width:100px">Status</th></tr></thead><tbody>';
    tasks.forEach(function(t){
      html += '<tr>'+

        '<td style="font-size:11px;color:#64748b">'+fmtDate(t.start)+'</td>'+
        '<td style="font-size:11px;color:#64748b">'+fmtDate(t.end)+'</td>'+
        '<td>'+badge(t.status || '—', statusBadgeColor(t.status))+'</td>'+
      '</tr>';
    });
    html += '</tbody></table>';

    // Site Works Tasks (Scope) table
    if(siteTasks.length > 0){
      html += '<div class="sec">Site Works Tasks (Scope)</div>';
      html += '<table><thead><tr><th style="width:36px">#</th><th>Task</th><th style="width:140px">Due</th><th style="width:120px">Assignee</th><th style="width:100px">Status</th></tr></thead><tbody>';
      siteTasks.forEach(function(t, i){
        html += '<tr>'+
          '<td style="font-size:11px;color:#94a3b8;font-weight:600">'+(i+1)+'</td>'+
          '<td style="font-weight:500">'+esc(t.name)+'</td>'+
          '<td style="font-size:11px;color:#64748b">'+fmtDate(t.due)+'</td>'+
          '<td style="font-size:11px;color:#64748b">'+esc(t.assignee || '—')+'</td>'+
          '<td>'+badge(t.status || '—', statusBadgeColor(t.status))+'</td>'+
        '</tr>';
      });
      html += '</tbody></table>';
    }

    document.getElementById('tab-schedule').innerHTML = html;

    // Draw Gantt chart after DOM insert
    setTimeout(function(){
      var TASKS = tasks.map(function(t){
        return {n:t.name, s:t.start, e:t.end, st:(t.status||'').toLowerCase()};
      });

      var _now = new Date();
      var TODAY = _now.getTime();
      var _MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var _DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var _lbl = document.getElementById('todayLabel');
      if(_lbl) _lbl.textContent = 'Today: '+_DAYS[_now.getDay()]+' '+_now.getDate()+' '+_MONTHS[_now.getMonth()]+' '+_now.getFullYear();

      // Find project start/end
      var allTs = [];
      TASKS.forEach(function(t){
        if(t.s) allTs.push(t.s);
        if(t.e) allTs.push(t.e);
      });
      if(allTs.length === 0) return;

      var PROJ_S = Math.min.apply(null, allTs) - 864e5;
      var PROJ_E = Math.max.apply(null, allTs) + 864e5*3;

      var LBL_W = 155, ROW_H = 22, HDR_H = 42, PAD_R = 20;
      var COLORS = {done:'#16a34a','in progress':'#f8ae00',scheduled:'#7c3aed','not started':'#dc2626',wip:'#f8ae00',todo:'#dc2626'};

      var c = document.getElementById('ganttChart');
      var containerEl = c.parentElement;
      var W = Math.max(880, containerEl.clientWidth || 900);
      var CHART_W = W - LBL_W - PAD_R;
      var H = HDR_H + TASKS.length * ROW_H + 20;
      c.width = W; c.height = H;
      c.style.width = W+'px'; c.style.height = H+'px';
      var ctx = c.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0,0,W,H);

      function toX(ts){ return LBL_W + ((ts - PROJ_S) / (PROJ_E - PROJ_S)) * CHART_W; }

      // Month + week grid lines + date headers
      var _DAYN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

      // First pass: month separator lines (solid, heavier)
      var dMo = new Date(PROJ_S);
      dMo.setHours(0,0,0,0);
      dMo.setDate(1); // start of month containing PROJ_S
      var drawnMonthLabel = {};
      while(dMo.getTime() < PROJ_E + 864e5*7){
        var xMo = toX(dMo.getTime());
        if(xMo >= LBL_W && xMo <= W){
          // Solid month separator line
          ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5;
          ctx.setLineDash([]);
          ctx.beginPath(); ctx.moveTo(xMo, HDR_H); ctx.lineTo(xMo, H-8); ctx.stroke();
          // Month label at top
          ctx.font = '700 10px system-ui,sans-serif';
          ctx.fillStyle = '#0f2540';
          ctx.textAlign = 'center';
          ctx.fillText(_MONTHS[dMo.getMonth()].toUpperCase(), xMo + 40, 14);
          drawnMonthLabel[dMo.getMonth()] = true;
        }
        dMo.setMonth(dMo.getMonth()+1);
        dMo.setDate(1);
      }

      // Second pass: week lines (dashed) + date labels with day name
      var dWk = new Date(PROJ_S);
      dWk.setHours(0,0,0,0);
      while(dWk.getDay() !== 1) dWk.setDate(dWk.getDate()-1);
      ctx.textAlign = 'center';
      while(dWk.getTime() < PROJ_E + 864e5*7){
        var xWk = toX(dWk.getTime());
        if(xWk >= LBL_W && xWk <= W){
          // Dashed week separator line
          ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.8;
          ctx.setLineDash([4,3]);
          ctx.beginPath(); ctx.moveTo(xWk, HDR_H); ctx.lineTo(xWk, H-8); ctx.stroke();
          ctx.setLineDash([]);
          // Date label: "Mon 23 Mar"
          ctx.font = '600 9px system-ui,sans-serif';
          ctx.fillStyle = '#64748b';
          ctx.fillText(_DAYN[dWk.getDay()]+' '+dWk.getDate()+' '+_MONTHS[dWk.getMonth()], xWk, HDR_H-6);
        }
        dWk.setDate(dWk.getDate()+7);
      }

      ctx.setLineDash([]);
      ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(LBL_W, HDR_H); ctx.lineTo(W, HDR_H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(LBL_W, 0); ctx.lineTo(LBL_W, H); ctx.stroke();

      // Task bars
      TASKS.forEach(function(t, i){
        var y = HDR_H + i * ROW_H;
        if(i%2===0){ ctx.fillStyle = 'rgba(248,250,252,0.7)'; ctx.fillRect(0,y,W,ROW_H); }
        ctx.strokeStyle = '#f1f5f9'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(0,y+ROW_H); ctx.lineTo(W,y+ROW_H); ctx.stroke();

        ctx.fillStyle = '#374151';
        ctx.font = '11px system-ui,sans-serif';
        ctx.textAlign = 'left';
        var lbl = t.n;
        while(ctx.measureText(lbl).width > LBL_W - 12 && lbl.length > 3) lbl = lbl.slice(0,-1);
        if(lbl !== t.n) lbl += '\u2026';
        ctx.fillText(lbl, 8, y + ROW_H/2 + 4);

        if(!t.s && !t.e) return;
        var startTs = t.s || t.e;
        var endTs = t.e || t.s;
        var bx = toX(startTs);
        var ex = toX(endTs);
        var bw = Math.max(ex-bx, 10);
        var by = y + 4;
        var bh = ROW_H - 8;
        var col = COLORS[t.st] || '#dc2626';

        ctx.fillStyle = col;
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(bx,by,bw,bh,3); else ctx.rect(bx,by,bw,bh);
        ctx.fill();

        if(t.st === 'done'){
          ctx.fillStyle = 'rgba(255,255,255,0.95)';
          ctx.font = 'bold 9px system-ui';
          ctx.textAlign = 'center';
          ctx.fillText('\u2713', bx + bw/2, by + bh/2 + 3);
        }
      });

      // TODAY line
      var tx = toX(TODAY);
      if(tx >= LBL_W && tx <= W){
        ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 1.5;
        ctx.setLineDash([4,3]);
        ctx.beginPath(); ctx.moveTo(tx,0); ctx.lineTo(tx,H); ctx.stroke();
        ctx.setLineDash([]);
        var _todayStr = _now.getDate()+' '+_MONTHS[_now.getMonth()];
        ctx.font = '700 9px system-ui,sans-serif';
        ctx.textAlign = 'center';
        var _tw = ctx.measureText(_todayStr).width + 8;
        ctx.fillStyle = '#dc2626';
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(tx - _tw/2, H-16, _tw, 13, 2); else ctx.rect(tx - _tw/2, H-16, _tw, 13);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillText(_todayStr, tx, H-5);
      }
    }, 20);

    // ────────────────────────────────────────────────────────────
    // Second Gantt: site works tasks (List 10), if present
    // ────────────────────────────────────────────────────────────
    if(siteTasks.length > 0){
      setTimeout(function(){
        var TASKS = siteTasks.map(function(t){
          // Site tasks may have only `due` — fall back to single-day bar
          var s = (t.start != null) ? t.start : t.due;
          var e = (t.end   != null) ? t.end   : t.due;
          return {n:t.name, s:s, e:e, st:(t.status||'').toLowerCase()};
        });

        var _now = new Date();
        var TODAY = _now.getTime();
        var _MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var _DAYN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

        var allTs = [];
        TASKS.forEach(function(t){ if(t.s) allTs.push(t.s); if(t.e) allTs.push(t.e); });
        if(allTs.length === 0) return;

        var PROJ_S = Math.min.apply(null, allTs) - 864e5;
        var PROJ_E = Math.max.apply(null, allTs) + 864e5*2;

        var LBL_W = 280, ROW_H = 22, HDR_H = 42, PAD_R = 20;
        var COLORS = {done:'#16a34a','in progress':'#f8ae00',scheduled:'#7c3aed','not started':'#dc2626',wip:'#f8ae00',todo:'#dc2626'};

        var c = document.getElementById('ganttChart2');
        if(!c) return;
        var containerEl = c.parentElement;
        var W = Math.max(880, containerEl.clientWidth || 900);
        var CHART_W = W - LBL_W - PAD_R;
        var H = HDR_H + TASKS.length * ROW_H + 20;
        c.width = W; c.height = H;
        c.style.width = W+'px'; c.style.height = H+'px';
        var ctx = c.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0,0,W,H);

        function toX(ts){ return LBL_W + ((ts - PROJ_S) / (PROJ_E - PROJ_S)) * CHART_W; }

        // Day-by-day grid (this Gantt covers a small ~2 week range)
        var dDay = new Date(PROJ_S);
        dDay.setHours(0,0,0,0);
        while(dDay.getTime() < PROJ_E + 864e5){
          var xDay = toX(dDay.getTime());
          if(xDay >= LBL_W && xDay <= W){
            ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.8;
            ctx.setLineDash([3,2]);
            ctx.beginPath(); ctx.moveTo(xDay, HDR_H); ctx.lineTo(xDay, H-8); ctx.stroke();
            ctx.setLineDash([]);
            ctx.font = '600 9px system-ui,sans-serif';
            ctx.fillStyle = '#64748b';
            ctx.textAlign = 'center';
            ctx.fillText(_DAYN[dDay.getDay()]+' '+dDay.getDate()+' '+_MONTHS[dDay.getMonth()], xDay + (CHART_W/((PROJ_E-PROJ_S)/864e5))/2, HDR_H-6);
          }
          dDay.setDate(dDay.getDate()+1);
        }

        ctx.setLineDash([]);
        ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(LBL_W, HDR_H); ctx.lineTo(W, HDR_H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(LBL_W, 0); ctx.lineTo(LBL_W, H); ctx.stroke();

        TASKS.forEach(function(t, i){
          var y = HDR_H + i * ROW_H;
          if(i%2===0){ ctx.fillStyle = 'rgba(248,250,252,0.7)'; ctx.fillRect(0,y,W,ROW_H); }
          ctx.strokeStyle = '#f1f5f9'; ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.moveTo(0,y+ROW_H); ctx.lineTo(W,y+ROW_H); ctx.stroke();

          ctx.fillStyle = '#374151';
          ctx.font = '11px system-ui,sans-serif';
          ctx.textAlign = 'left';
          var lbl = t.n;
          while(ctx.measureText(lbl).width > LBL_W - 12 && lbl.length > 3) lbl = lbl.slice(0,-1);
          if(lbl !== t.n) lbl += '\u2026';
          ctx.fillText(lbl, 8, y + ROW_H/2 + 4);

          if(!t.s && !t.e) return;
          var startTs = t.s || t.e;
          var endTs = t.e || t.s;
          // Pad single-day tasks so they're visible
          if(endTs <= startTs) endTs = startTs + 864e5;
          var bx = toX(startTs);
          var ex = toX(endTs);
          var bw = Math.max(ex-bx, 12);
          var by = y + 4;
          var bh = ROW_H - 8;
          var col = COLORS[t.st] || '#dc2626';

          ctx.fillStyle = col;
          ctx.beginPath();
          if(ctx.roundRect) ctx.roundRect(bx,by,bw,bh,3); else ctx.rect(bx,by,bw,bh);
          ctx.fill();

          if(t.st === 'done'){
            ctx.fillStyle = 'rgba(255,255,255,0.95)';
            ctx.font = 'bold 9px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText('\u2713', bx + bw/2, by + bh/2 + 3);
          }
        });

        // TODAY line
        var tx2 = toX(TODAY);
        if(tx2 >= LBL_W && tx2 <= W){
          ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 1.5;
          ctx.setLineDash([4,3]);
          ctx.beginPath(); ctx.moveTo(tx2,0); ctx.lineTo(tx2,H); ctx.stroke();
          ctx.setLineDash([]);
          var _ts2 = _now.getDate()+' '+_MONTHS[_now.getMonth()];
          ctx.font = '700 9px system-ui,sans-serif';
          ctx.textAlign = 'center';
          var _tw2 = ctx.measureText(_ts2).width + 8;
          ctx.fillStyle = '#dc2626';
          ctx.beginPath();
          if(ctx.roundRect) ctx.roundRect(tx2 - _tw2/2, H-16, _tw2, 13, 2); else ctx.rect(tx2 - _tw2/2, H-16, _tw2, 13);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.fillText(_ts2, tx2, H-5);
        }
      }, 25);
    }
  })();

  // ══════════════════════════════
  // 10. PROJECT MILESTONES TAB (Canvas)
  // ══════════════════════════════
  (function(){
    var groups = D.milestoneGroups || [];
    if(groups.length === 0){
      document.getElementById('tab-milestones').innerHTML = '<div style="background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);font-size:12px;color:#94a3b8">No milestone data available.</div>';
      return;
    }

    var html = '';
    html += '<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:11px 16px;margin-bottom:14px;font-size:12px;color:#1e40af;display:flex;align-items:flex-start;gap:10px">'+
      '<span style="font-size:15px;flex-shrink:0">&#127919;</span>'+
      '<div><strong>Project Milestones</strong> — Each operational area has its own timeline showing key checkpoints. Green = done, amber = gap/needs action, grey = not started. Milestones are auto-detected from ClickUp.</div>'+
    '</div>';
    html += '<div id="tl-container"></div>';
    document.getElementById('tab-milestones').innerHTML = html;

    var COL  = {done:'#16a34a',wip:'#1d4ed8',gap:'#d97706',todo:'#dc2626'};
    var LINE_DONE = '#16a34a', LINE_WIP = '#93c5fd', LINE_TODO = '#e2e8f0';

    var container = document.getElementById('tl-container');

    groups.forEach(function(g, gi){
      var nodes = g.nodes || [];
      if(nodes.length === 0) return;

      var card = document.createElement('div');
      card.style.cssText = 'background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.1);overflow:hidden;margin-bottom:12px';

      // Header
      var hdrEl = document.createElement('div');
      hdrEl.style.cssText = 'background:#0f2540;color:#fff;padding:10px 18px;display:flex;align-items:center;justify-content:space-between';
      var countDone = nodes.filter(function(n){ return n.status === 'done'; }).length;
      hdrEl.innerHTML = '<div><span style="font-size:12px;font-weight:700">'+esc(g.title)+'</span><span style="font-size:11px;color:#7fa8cc;margin-left:10px">'+esc(g.listNames||'')+'</span></div><div style="font-size:11px;font-weight:600">'+countDone+' / '+nodes.length+' complete</div>';
      card.appendChild(hdrEl);

      // Canvas
      var wrap = document.createElement('div');
      wrap.style.cssText = 'overflow-x:auto;padding:0';
      var cv = document.createElement('canvas');
      cv.id = 'tl'+gi;
      wrap.appendChild(cv);
      card.appendChild(wrap);
      container.appendChild(card);

      // Draw after DOM insert
      setTimeout(function(){
        var count = nodes.length;
        var padL=60, padR=60, padT=72, padB=72;

        // Parse dates for proportional positioning
        var MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
        function parseNodeDate(str){
          if(!str) return null;
          var m = (str+'').match(/(\d+)\s+([a-zA-Z]+)/);
          if(!m) return null;
          var day = parseInt(m[1],10);
          var mon = MONTHS[(m[2]).toLowerCase().substring(0,3)];
          if(mon===undefined) return null;
          var yr = new Date().getFullYear();
          return new Date(yr, mon, day).getTime();
        }
        var dates = nodes.map(function(nd){ return parseNodeDate(nd.date); });
        var validDates = dates.filter(function(d){ return d !== null; });
        var useProportional = validDates.length >= 2;
        var minDate, maxDate, dateRange;
        if(useProportional){
          minDate = Math.min.apply(null, validDates);
          maxDate = Math.max.apply(null, validDates);
          dateRange = maxDate - minDate;
          if(dateRange === 0) useProportional = false;
        }

        var W = Math.max(padL + padR + (count-1)*140, wrap.clientWidth || 800);
        var usableW = W - padL - padR;
        var H = padT + 40 + padB;
        var lineY = padT + 20;
        cv.width = W; cv.height = H;
        cv.style.width = W+'px'; cv.style.height = H+'px';
        var ctx = cv.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,W,H);

        // Compute x positions (date-proportional or evenly spaced fallback)
        var xPositions = nodes.map(function(nd, i){
          if(useProportional && dates[i] !== null){
            return padL + ((dates[i] - minDate) / dateRange) * usableW;
          }
          return padL + (usableW / (count - 1)) * i;
        });
        // Ensure minimum spacing of 60px between adjacent nodes
        for(var k=1;k<xPositions.length;k++){
          if(xPositions[k] - xPositions[k-1] < 60) xPositions[k] = xPositions[k-1] + 60;
        }
        // Recalculate W if nodes extend beyond
        var actualMaxX = xPositions[xPositions.length-1] + padR;
        if(actualMaxX > W){ W = actualMaxX; cv.width = W; cv.style.width = W+'px'; ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); }

        // Date scale markers along timeline
        if(useProportional){
          ctx.font = '500 9px Inter,system-ui';
          ctx.textAlign = 'center';
          ctx.fillStyle = '#94a3b8';
          // Draw weekly date markers
          var weekMs = 7*24*60*60*1000;
          var scaleStart = minDate - (minDate % weekMs);
          for(var d = scaleStart; d <= maxDate + weekMs; d += weekMs){
            if(d < minDate - weekMs/2) continue;
            var sx = padL + ((d - minDate) / dateRange) * usableW;
            if(sx < padL - 10 || sx > W - padR + 10) continue;
            // Tick mark
            ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1; ctx.setLineDash([]);
            ctx.beginPath(); ctx.moveTo(sx, lineY+22); ctx.lineTo(sx, lineY+28); ctx.stroke();
            // Date label
            var dd = new Date(d);
            ctx.fillStyle = '#94a3b8';
            ctx.fillText(dd.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dd.getMonth()], sx, lineY+38);
          }
        }

        // Background connector
        ctx.strokeStyle = LINE_TODO; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(xPositions[0], lineY); ctx.lineTo(xPositions[count-1], lineY); ctx.stroke();

        // Progress connector
        var lastDone = -1;
        for(var i=0;i<count;i++){if(nodes[i].status==='done'||nodes[i].status==='wip')lastDone=i;}
        if(lastDone >= 0){
          var ld = -1;
          for(var i=0;i<count;i++){if(nodes[i].status==='done')ld=i;}
          if(ld>=0){
            ctx.strokeStyle = LINE_DONE; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(xPositions[0], lineY);
            ctx.lineTo(xPositions[ld], lineY); ctx.stroke();
          }
          if(lastDone > ld){
            ctx.strokeStyle = LINE_WIP; ctx.lineWidth = 3;
            ctx.setLineDash([6,4]);
            ctx.beginPath(); ctx.moveTo(xPositions[Math.max(ld,0)], lineY);
            ctx.lineTo(xPositions[lastDone], lineY); ctx.stroke();
            ctx.setLineDash([]);
          }
        }

        // Nodes
        nodes.forEach(function(nd, i){
          var x = xPositions[i];
          var r = 19;
          var col = COL[nd.status] || COL.todo;
          var above = (i % 2 === 0);

          // Circle — white fill with coloured border
          ctx.beginPath(); ctx.arc(x, lineY, r, 0, Math.PI*2);
          ctx.fillStyle='#fff'; ctx.fill();
          ctx.strokeStyle=col; ctx.lineWidth=3; ctx.stroke();
          // Emoji icon
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.font = '16px sans-serif';
          ctx.fillText(nd.icon || '', x, lineY+1);

          // Label pill — include date
          var lines = (nd.name||'').split('\n');
          if(nd.date) lines.push(nd.date);
          ctx.font = '600 10px Inter,system-ui';
          ctx.textAlign = 'center';
          var lblCol = nd.status==='done'?'#166534':nd.status==='wip'?'#1e40af':nd.status==='gap'?'#92400e':'#991b1b';
          var bgCol = nd.status==='done'?'#f0fdf4':nd.status==='wip'?'#eff6ff':nd.status==='gap'?'#fffbeb':'#fef2f2';
          var bdCol = nd.status==='done'?'#bbf7d0':nd.status==='wip'?'#bfdbfe':nd.status==='gap'?'#fde68a':'#fecaca';

          var maxW = 0;
          lines.forEach(function(l){maxW=Math.max(maxW, ctx.measureText(l).width);});
          var pw=maxW+14, ph=lines.length*12+10;

          if(above){
            var ly = lineY - r - 10 - ph;
            ctx.strokeStyle=bdCol; ctx.lineWidth=1; ctx.setLineDash([2,2]);
            ctx.beginPath(); ctx.moveTo(x, lineY-r-2); ctx.lineTo(x, ly+ph); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle=bgCol; ctx.strokeStyle=bdCol; ctx.lineWidth=1;
            ctx.beginPath();
            if(ctx.roundRect) ctx.roundRect(x-pw/2, ly, pw, ph, 5); else ctx.rect(x-pw/2, ly, pw, ph);
            ctx.fill(); ctx.stroke();
            // Draw text lines — date line in lighter weight
            lines.forEach(function(l,li){
              var isDateLine = nd.date && li === lines.length-1;
              ctx.font = isDateLine ? '500 9px Inter,system-ui' : '600 10px Inter,system-ui';
              ctx.fillStyle = isDateLine ? (nd.status==='done'?'#22c55e':nd.status==='wip'?'#60a5fa':nd.status==='gap'?'#f59e0b':'#f87171') : lblCol;
              ctx.fillText(l, x, ly+9+li*12);
            });
          } else {
            var ly2 = lineY + r + 10;
            ctx.strokeStyle=bdCol; ctx.lineWidth=1; ctx.setLineDash([2,2]);
            ctx.beginPath(); ctx.moveTo(x, lineY+r+2); ctx.lineTo(x, ly2); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle=bgCol; ctx.strokeStyle=bdCol; ctx.lineWidth=1;
            ctx.beginPath();
            if(ctx.roundRect) ctx.roundRect(x-pw/2, ly2, pw, ph, 5); else ctx.rect(x-pw/2, ly2, pw, ph);
            ctx.fill(); ctx.stroke();
            lines.forEach(function(l,li){
              var isDateLine = nd.date && li === lines.length-1;
              ctx.font = isDateLine ? '500 9px Inter,system-ui' : '600 10px Inter,system-ui';
              ctx.fillStyle = isDateLine ? (nd.status==='done'?'#22c55e':nd.status==='wip'?'#60a5fa':nd.status==='gap'?'#f59e0b':'#f87171') : lblCol;
              ctx.fillText(l, x, ly2+9+li*12);
            });
          }
        });
      }, 10);
    });
  })();

  // ══════════════════════════════
  // 11. ACTIONS TAB
  // ══════════════════════════════
  (function(){
    var html = '';

    // Project summary cards at top
    if(D.projectSummary && D.projectSummary.length > 0){
      html += '<div class="sec" style="margin-top:0">Project Summary / Key Issues</div>';
      html += '<div class="summary-grid">';
      D.projectSummary.forEach(function(s){
        html += '<div class="summary-card" style="border-left-color:'+(s.color||'#e2e8f0')+'">'+
          '<div class="sc-body">'+
            '<div class="sc-title">'+esc(s.title)+'<span class="sc-owner">'+esc(s.owner)+'</span></div>'+
            '<div class="sc-detail">'+esc(s.detail)+'</div>'+
          '</div>'+
        '</div>';
      });
      html += '</div>';
    }

    // Action items
    if(D.actions && D.actions.length > 0){
      html += '<div class="sec">Priority Actions — '+esc(D.generated)+'</div>';
      html += '<ul class="action-list">';
      D.actions.forEach(function(a){
        var pClass = (a.priority||'').toLowerCase();
        if(pClass !== 'urgent' && pClass !== 'high' && pClass !== 'normal') pClass = 'normal';
        html += '<li class="action-item '+pClass+'">'+
          '<div class="action-num">#'+a.num+'</div>'+
          '<div class="action-body">'+
            '<div class="action-title">'+esc(a.title)+'</div>'+
            '<div class="action-meta">'+
              '<span>'+badge(a.priority || 'normal', pClass==='urgent'?'red':pClass==='high'?'amber':'blue')+'</span>'+
              '<span>Owner: <strong>'+esc(a.owner)+'</strong></span>'+
            '</div>'+
            '<div style="font-size:11px;color:#64748b;margin-top:4px">'+esc(a.detail)+'</div>'+
          '</div>'+
        '</li>';
      });
      html += '</ul>';
    } else {
      html += '<div style="background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);font-size:12px;color:#94a3b8">No action items recorded.</div>';
    }

    document.getElementById('tab-actions').innerHTML = html;
  })();

  // (Meeting Notes tab removed)

  // ══════════════════════════════
  // 13. FOOTER
  // ══════════════════════════════
  var ftr = document.getElementById('ftr');
  ftr.innerHTML = '<span>SBI &mdash; Spoke Building & Interiors</span>'+
    '<span>'+esc(P.jobNumber)+' '+esc(P.name)+' &nbsp;&middot;&nbsp; '+esc(P.site)+' &nbsp;&middot;&nbsp; Client: '+esc(D.footer.client || P.client)+' &nbsp;&middot;&nbsp; PM: '+esc(D.footer.pm || P.pm)+'</span>';

})();
</script>

<script>
// ══════════════════════════════════════════════════════════════════════════
// SAVE SYSTEM + ETC + RESTORE
// ══════════════════════════════════════════════════════════════════════════

// Reset save button (outerHTML captures mid-save state)
(function(){
  var btn = document.getElementById('saveBtn');
  if(btn){ btn.innerHTML = '&#128190; Save'; btn.disabled = false; btn.style.background = '#16a34a'; }
})();

// Read persisted data from the JSON block
function getDashboardData(){
  try { return JSON.parse(document.getElementById('dashboard-data').textContent); }
  catch(e){ return {etc:[],notes:{},checks:[]}; }
}

// Read project data
function getProjectData(){
  try { return JSON.parse(document.getElementById('project-data').textContent); }
  catch(e){ return {project:{jobNumber:'000000',name:'unknown'}}; }
}

var SESSION_ETC = [];

function getEntries(){
  var saved = getDashboardData().etc || [];
  var all = saved.concat(SESSION_ETC);
  all.sort(function(a,b){ return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
  return all;
}

function renderHistory(){
  var container = document.getElementById('etc-history');
  if(!container) return;
  var entries = getEntries();
  if(entries.length === 0){
    container.innerHTML = '<div style="padding:12px 18px;font-size:11px;color:#94a3b8;font-style:italic">No previous entries. Add your first cost-to-complete estimate below.</div>';
    return;
  }
  var html = '';
  entries.forEach(function(e, i){
    var isLatest = (i === entries.length - 1);
    var isUnsaved = e.unsaved;
    var bg = isLatest ? 'background:#fffbeb;' : isUnsaved ? 'background:#fef3c7;' : '';
    var badges = '';
    if(isLatest) badges += ' <span style="background:#fffbeb;color:#d97706;font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:6px">LATEST</span>';
    if(isUnsaved) badges += ' <span style="background:#fef2f2;color:#dc2626;font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:4px">UNSAVED</span>';
    else badges += ' <span style="background:#f0fdf4;color:#16a34a;font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:4px">SAVED</span>';

    html += '<div style="display:grid;grid-template-columns:100px 1fr 120px 50px;padding:7px 18px;gap:10px;align-items:center;border-bottom:1px solid #f1f5f9;'+bg+'font-size:12px">';
    html += '<div style="font-size:11px;color:#64748b">'+e.date+'</div>';
    html += '<div style="color:#374151">'+e.desc+badges+'</div>';
    html += '<div style="text-align:right;font-weight:600;color:#0f2540">$'+e.amount.toLocaleString('en-AU')+'</div>';
    html += isUnsaved ? '<button onclick="deleteETCEntry('+i+')" style="background:none;border:none;color:#dc2626;font-size:14px;cursor:pointer;padding:4px" title="Delete">&times;</button>' : '<div></div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function saveETCEntry(){
  var date = document.getElementById('etc-new-date').value;
  var desc = document.getElementById('etc-new-desc').value.trim();
  var amt = parseFloat(document.getElementById('etc-new-amt').value) || 0;
  if(!desc || amt <= 0){ document.getElementById('etc-new-desc').style.borderColor='#dc2626'; return; }
  if(!date){ date = new Date().toISOString().split('T')[0]; }

  SESSION_ETC.push({date:date, desc:desc, amount:amt, unsaved:true});

  document.getElementById('etc-new-desc').value = '';
  document.getElementById('etc-new-amt').value = '';
  document.getElementById('etc-new-date').valueAsDate = new Date();

  renderHistory();
  calcETC();
}

function deleteETCEntry(idx){
  var entries = getEntries();
  var entry = entries[idx];
  var si = SESSION_ETC.indexOf(entry);
  if(si >= 0){ SESSION_ETC.splice(si, 1); }
  else { return; }
  renderHistory();
  calcETC();
}

function calcETC(){
  var BUDGET_LEFT = window.__BUDGET_LEFT || 0;
  var entries = getEntries();
  var latestAmt = entries.length > 0 ? entries[entries.length - 1].amount : 0;
  var newAmtEl = document.getElementById('etc-new-amt');
  var newAmt = newAmtEl ? (parseFloat(newAmtEl.value) || 0) : 0;
  var displayAmt = newAmt > 0 ? newAmt : latestAmt;

  var projected = BUDGET_LEFT - displayAmt;

  var etcTotal = document.getElementById('etc-total');
  var etcProj = document.getElementById('etc-projected');
  var etcStatus = document.getElementById('etc-status');

  if(etcTotal) etcTotal.textContent = '$' + displayAmt.toLocaleString('en-AU',{minimumFractionDigits:0,maximumFractionDigits:0});
  if(etcProj){
    etcProj.textContent = (projected<0?'-':'') + '$' + Math.abs(projected).toLocaleString('en-AU',{minimumFractionDigits:0,maximumFractionDigits:0});
    etcProj.style.color = projected >= 0 ? '#4ade80' : '#fca5a5';
  }

  if(etcStatus){
    if(displayAmt > 0){
      if(projected >= 0){
        etcStatus.innerHTML = '&#10003; Project projected to finish <strong style="color:#4ade80">$'+Math.abs(projected).toLocaleString('en-AU')+' under budget</strong>';
      } else {
        etcStatus.innerHTML = '&#9888; Project projected to finish <strong style="color:#fca5a5">$'+Math.abs(projected).toLocaleString('en-AU')+' OVER budget</strong> \u2014 discuss with client';
      }
      if(newAmt > 0){ etcStatus.innerHTML += '<span style="color:#f59e0b;margin-left:10px">(preview \u2014 click Save to record)</span>'; }
    } else {
      etcStatus.textContent = 'Enter an estimated cost to complete to see the projected balance';
    }
  }
}

(function(){

// ── TAB SWITCHING ──
function showTab(id){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  var panel = document.getElementById('tab-'+id);
  if(panel) panel.classList.add('active');
  var btns = document.querySelectorAll('.tab-btn');
  for(var i=0;i<btns.length;i++){
    if(btns[i].onclick && btns[i].onclick.toString().indexOf("'"+id+"'") !== -1){
      btns[i].classList.add('active');
      break;
    }
  }
}

// ── FILE HANDLE PERSISTENCE (IndexedDB) ──
var DB_NAME = 'sbi_dashboard';
var STORE = 'handles';
var _pd = getProjectData();
var HANDLE_KEY = _pd.project.jobNumber || '000000';

function openDB(){
  return new Promise(function(resolve, reject){
    var req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = function(){ req.result.createObjectStore(STORE); };
    req.onsuccess = function(){ resolve(req.result); };
    req.onerror = function(){ reject(req.error); };
  });
}

async function storeHandle(handle){
  var db = await openDB();
  var tx = db.transaction(STORE, 'readwrite');
  tx.objectStore(STORE).put(handle, HANDLE_KEY);
}

async function loadHandle(){
  try {
    var db = await openDB();
    var tx = db.transaction(STORE, 'readonly');
    return new Promise(function(resolve){
      var req = tx.objectStore(STORE).get(HANDLE_KEY);
      req.onsuccess = function(){ resolve(req.result || null); };
      req.onerror = function(){ resolve(null); };
    });
  } catch(e){ return null; }
}

// ── SAVE ALL ──
async function saveAll(){
  var btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving...';
  btn.disabled = true;

  try {
    // 1. Collect all data
    var allETC = getEntries().map(function(e){ return {date:e.date, desc:e.desc, amount:e.amount}; });

    var notesData = {};
    document.querySelectorAll('[data-save-id]').forEach(function(el){
      if(el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') notesData[el.getAttribute('data-save-id')] = el.value;
      else notesData[el.getAttribute('data-save-id')] = el.innerHTML;
    });

    // 2. Update the JSON data block in the DOM
    var saveData = {etc: allETC, notes: notesData};
    document.getElementById('dashboard-data').textContent = JSON.stringify(saveData);

    // 3. Session entries are now saved — clear them
    SESSION_ETC = [];

    // 4. Reset button state BEFORE capturing HTML
    btn.innerHTML = '&#128190; Save';
    btn.disabled = false;

    // 5. Get the full HTML with updated data block
    var html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

    // 6. Write to file
    var pd = getProjectData();
    var slug = (pd.project.name || 'project').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    var suggestedName = pd.project.jobNumber + '-' + slug + '.html';

    if(window.showSaveFilePicker){
      var handle = await loadHandle();
      if(handle){
        var perm = await handle.queryPermission({mode:'readwrite'});
        if(perm !== 'granted'){
          perm = await handle.requestPermission({mode:'readwrite'});
        }
        if(perm !== 'granted') handle = null;
      }
      if(!handle){
        handle = await window.showSaveFilePicker({
          suggestedName: suggestedName,
          types: [{description:'HTML',accept:{'text/html':['.html']}}]
        });
        await storeHandle(handle);
      }
      var writable = await handle.createWritable();
      await writable.write(html);
      await writable.close();
    } else {
      var blob = new Blob([html], {type:'text/html'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = suggestedName;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // 7. Update UI
    renderHistory();
    calcETC();
    btn.textContent = '\u2713 Saved';
    setTimeout(function(){ btn.innerHTML = '&#128190; Save'; }, 2000);

  } catch(e) {
    if(e.name === 'AbortError'){
      btn.innerHTML = '&#128190; Save';
      btn.disabled = false;
      return;
    }
    console.error('Save failed:', e);
    btn.textContent = 'Save failed';
    btn.style.background = '#dc2626';
    setTimeout(function(){ btn.innerHTML = '&#128190; Save'; btn.disabled = false; btn.style.background = '#16a34a'; }, 3000);
  }
}
</script>
